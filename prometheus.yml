global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Scrape configuration for Sophosic Platform
scrape_configs:

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    dns_sd_configs:
      - names: ['sophosic-prometheus-discovery']
        port: 9090
        type: A
        refresh_interval: 5s

  # Sophosic API Backend - FastAPI with custom Prometheus metrics
  # Exposes: HTTP metrics, DB metrics, Redis metrics, External API metrics, Streaming metrics
  - job_name: 'sophosic-api'
    dns_sd_configs:
      - names: ['sophosic-api-gksh-discovery']
        port: 10000
        type: A
        refresh_interval: 5s
    metrics_path: /metrics
    # Longer timeout for potentially slow metrics collection
    scrape_timeout: 10s

  # Grafana Loki - Log aggregation metrics
  - job_name: 'sophosic-loki'
    dns_sd_configs:
      - names: ['sophosic-loki-discovery']
        port: 3100
        type: A
        refresh_interval: 5s
    metrics_path: /metrics
